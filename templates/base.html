<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ project_name }} Knowledge Base{% endblock %}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            line-height: 1.6;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        header {
            background: linear-gradient(135deg, #1e293b 0%, #334155 100%);
            padding: 20px 0;
            margin-bottom: 30px;
            border-bottom: 2px solid #3b82f6;
        }
        header h1 { font-size: 1.8rem; color: #60a5fa; }
        header p { color: #94a3b8; margin-top: 5px; }
        nav {
            background: #1e293b;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            gap: 20px;
        }
        nav a {
            color: #94a3b8;
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 4px;
            transition: all 0.2s;
        }
        nav a:hover, nav a.active {
            background: #3b82f6;
            color: white;
        }
        .card {
            background: #1e293b;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid #334155;
        }
        .card h2 {
            color: #60a5fa;
            margin-bottom: 15px;
            font-size: 1.2rem;
        }
        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .search-box input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #334155;
            border-radius: 6px;
            background: #0f172a;
            color: #e2e8f0;
            font-size: 1rem;
        }
        .search-box button {
            padding: 12px 24px;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
        }
        .search-box button:hover { background: #2563eb; }
        .result-item {
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 6px;
            padding: 15px;
            margin-bottom: 10px;
        }
        .result-item h3 {
            color: #60a5fa;
            font-size: 1rem;
            margin-bottom: 8px;
        }
        .result-item .meta {
            color: #64748b;
            font-size: 0.85rem;
            margin-bottom: 10px;
        }
        .result-item .content {
            color: #cbd5e1;
            font-size: 0.9rem;
            white-space: pre-wrap;
            max-height: 150px;
            overflow: hidden;
        }
        .score {
            display: inline-block;
            background: #3b82f6;
            color: white;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
            margin-left: 10px;
        }
        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            margin-right: 5px;
        }
        .badge-raw { background: #f59e0b; color: #000; }
        .badge-verified { background: #10b981; color: #000; }
        .badge-merged { background: #3b82f6; color: #fff; }
        .badge-archived { background: #6b7280; color: #fff; }
        .badge-constraint { background: #ef4444; color: #fff; }
        .badge-rule { background: #f97316; color: #fff; }
        .badge-procedure { background: #8b5cf6; color: #fff; }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }
        .stat-card {
            background: #0f172a;
            padding: 15px;
            border-radius: 6px;
            text-align: center;
        }
        .stat-card .number {
            font-size: 2rem;
            font-weight: bold;
            color: #60a5fa;
        }
        .stat-card .label {
            color: #64748b;
            font-size: 0.9rem;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #334155;
        }
        th {
            color: #94a3b8;
            font-weight: 500;
        }
        .actions {
            display: flex;
            gap: 5px;
        }
        .btn {
            padding: 4px 12px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
        }
        .btn-verify { background: #10b981; color: #000; }
        .btn-archive { background: #6b7280; color: #fff; }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <header>
        <div class="container">
            <h1>🔷 {{ project_name }} Knowledge Base</h1>
            <p>Sistema de Memoria Persistente para Agentes de IA</p>
        </div>
    </header>
    
    <div class="container">
        <nav>
            <a href="/" {% if request.path == '/' %}class="active"{% endif %}>Dashboard</a>
            <a href="/search" {% if request.path == '/search' %}class="active"{% endif %}>Buscar</a>
            <a href="/issues" {% if request.path == '/issues' %}class="active"{% endif %}>Issues</a>
        </nav>
        
        {% block content %}{% endblock %}
    </div>
    
    {% block extra_js %}{% endblock %}
</body>
</html>
